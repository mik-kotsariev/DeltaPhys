name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Тести та перевірка
    runs-on: ubuntu-latest

    steps:
      - name: Checkout коду
        uses: actions/checkout@v4

      - name: Налаштування Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Встановлення залежностей
        run: npm ci

      - name: Запуск тестів
        run: npm test

  deploy:
